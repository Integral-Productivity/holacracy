name: release-please

# Opens / updates a "Release PR" on every push to `main`. When merged, it
# creates the matching `vX.Y.Z` git tag and GitHub Release, which in turn
# fires `promote-stable.yml` to fast-forward the `stable` branch the
# Integral-Productivity marketplace tracks.
#
# Pairs with:
#   - release-please-config.json     (per-package release behavior)
#   - .release-please-manifest.json  (current released version baseline)
#   - version.txt                    (required by release-type: simple)
#   - .github/workflows/promote-stable.yml  (consumes the tag we produce)
#
# Background: docs/adr/0002-use-tag-driven-stable-branch-for-marketplace-channel-publication.md
# called out that the manual tag-push step would fail in practice. It did,
# three times (v0.2.1, v0.2.2, v0.3.0 all merged without tags). This
# workflow closed that gap — until #19 hit the enterprise
# `can_approve_pull_request_reviews: false` policy that blocks GITHUB_TOKEN
# from opening Release PRs. The fix is to mint an installation token from
# the `ip-releaser` GitHub App and pass it to release-please-action.
#
# That App-mediated logic lives in devops-excellence (the canonical home
# for any Integral-Productivity workflow that consumes a managed-identity
# token). This workflow is now a thin caller of the reusable. Per
# Integral-Productivity/ip-bots' CLAUDE.md, App identities live in
# `ip-bots`; consumer logic that mints tokens from those identities lives
# in `devops-excellence`; per-repo wiring lives here.
#
# OP_SERVICE_ACCOUNT_TOKEN is the 1Password service-account token the
# reusable forwards into its read-releaser-pem-from-1p composite action.
# It's an org-level secret per Integral-Productivity/ip-bots ADR-003.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    uses: Integral-Productivity/devops-excellence/.github/workflows/reusable-release-please.yml@main
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
